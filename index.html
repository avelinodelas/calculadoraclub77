<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sistema Calculo Club77">
<title>Club77 criado por Avelino ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#050507;color:white;overflow-x:hidden;}

.binary{
position:fixed;width:100%;height:100%;overflow:hidden;
z-index:-1;opacity:0.05;font-size:14px;color:#00ff99;
white-space:nowrap;animation:scrollBinary 20s linear infinite;
}
@keyframes scrollBinary{from{transform:translateY(-100%);}to{transform:translateY(100%);}}

.container{max-width:520px;margin:20px auto;padding:15px;}

.title{
text-align:center;font-size:22px;color:#ff0080;
text-shadow:0 0 20px #ff0080;margin-bottom:10px;
}

.totalBox{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,0,128,0.3);
padding:15px;border-radius:15px;text-align:center;
margin-bottom:15px;box-shadow:0 0 25px rgba(255,0,128,0.2);
}

.totalValue{
font-size:20px;color:#00ff99;text-shadow:0 0 10px #00ff99;
}

.panel{
background:rgba(255,255,255,0.03);
backdrop-filter:blur(12px);
border:1px solid rgba(255,0,128,0.2);
border-radius:15px;padding:15px;margin-bottom:20px;
}

.panel h2{font-size:14px;color:#00f2ff;margin-bottom:8px;}

input{
width:100%;padding:10px;margin:6px 0;
background:#111;border:1px solid rgba(255,0,128,0.3);
border-radius:8px;color:white;text-align:center;
}

button{
width:100%;padding:10px;margin-top:8px;
border:none;border-radius:8px;
background:linear-gradient(90deg,#ff0080,#ff4da6);
color:white;font-weight:bold;cursor:pointer;
transition:0.15s ease;
}
button:active{transform:scale(0.97);}

.small{display:flex;gap:5px;}
.small button{font-size:12px;}

.danger{
background:linear-gradient(90deg,#ff3b3b,#ff0000);
}

.result{margin-top:8px;color:#00ff99;font-size:13px;}
.history{max-height:100px;overflow-y:auto;font-size:11px;margin-top:6px;opacity:0.7;}
.info{font-size:10px;opacity:0.5;text-align:center;margin-top:5px;}

canvas{margin-top:10px;}
</style>
</head>

<body>

<div class="binary" id="binary"></div>

<div class="container">

<div class="title">Club77 criado por Avelino ❤️</div>

<div class="totalBox">
<div>Total Acumulado (BRL)</div>
<div class="totalValue" id="totalAcumulado">R$ 0</div>
</div>

<div class="panel">
<h2>Lavagem</h2>
<input type="number" id="valorSujo" placeholder="Valor Sujo">
<input type="number" id="taxa" value="35" min="25" max="40">

<div class="small">
<button onclick="setParceria()">Parceria 25%</button>
<button onclick="setNaoParceria()">Não Parceria 35%</button>
</div>

<button onclick="calcularLavagem()">Executar Lavagem</button>
<button class="danger" onclick="apagarUltima()">Apagar Última Operação</button>

<div class="info">Taxas já incluem os 5% da máquina</div>
<div class="result" id="resultadoLavagem"></div>
<div class="history" id="historicoLavagem"></div>
</div>

<div class="panel">
<h2>Divisão</h2>
<input type="number" id="lucroSobrou" placeholder="Lucro que sobrou">
<button onclick="calcularDivisao()">Calcular Divisão</button>
<div class="result" id="resultadoDivisao"></div>
<div class="history" id="historicoDivisao"></div>
</div>

<div class="panel">
<h2>Lucro das Operações</h2>
<canvas id="graficoLucro"></canvas>
</div>

<div class="panel">
<h2>FAC x Gerente</h2>
<canvas id="graficoDivisao"></canvas>
</div>

</div>

<script>
let historicoLavagem=JSON.parse(localStorage.getItem("lavagem"))||[];
let historicoDivisao=JSON.parse(localStorage.getItem("divisao"))||[];
let arrecadacoes=JSON.parse(localStorage.getItem("arrecadacoes"))||[];
let total=JSON.parse(localStorage.getItem("total"))||0;

/* BINÁRIO */
let binaryEl=document.getElementById("binary");
let bin="";
for(let i=0;i<3000;i++){bin+=Math.random()>0.5?"1":"0";}
binaryEl.innerText=bin;

/* SOM DINHEIRO */
function playMoney(){
const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
const gain=ctx.createGain();
osc.type="triangle";
osc.frequency.value=600;
gain.gain.value=0.02;
osc.connect(gain);
gain.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.06);
}
document.addEventListener("click",e=>{if(e.target.tagName==="BUTTON"){playMoney();}});

function formatBRL(v){
return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function atualizarTotal(){
document.getElementById("totalAcumulado").innerText=formatBRL(total);
}

function calcularLavagem(){
let valor=parseFloat(document.getElementById("valorSujo").value);
let taxa=parseFloat(document.getElementById("taxa").value);
if(!valor||taxa<25||taxa>40)return;

let valorCliente=valor*(1-taxa/100);
let lucro=valor-valorCliente;

total+=lucro;
arrecadacoes.push(lucro);

document.getElementById("resultadoLavagem").innerHTML=
`Cliente: ${formatBRL(valorCliente)}<br>Lucro operação: ${formatBRL(lucro)}`;

document.getElementById("lucroSobrou").value=lucro;

historicoLavagem.unshift(`${formatBRL(valor)} → ${formatBRL(lucro)}`);

salvar();
render();
}

function apagarUltima(){
if(arrecadacoes.length===0)return;

let ultimoLucro=arrecadacoes.pop();
total-=ultimoLucro;
historicoLavagem.shift();

salvar();
render();
atualizarGrafico();
}

function calcularDivisao(){
let valor=parseFloat(document.getElementById("lucroSobrou").value);
if(!valor)return;

let p=valor>2000000?40:30;
let fac=valor*(p/100);
let gerente=valor-fac;

document.getElementById("resultadoDivisao").innerHTML=
`FAC: ${formatBRL(fac)}<br>Gerente: ${formatBRL(gerente)}`;

atualizarGraficoDivisao(fac,gerente);
}

function salvar(){
localStorage.setItem("lavagem",JSON.stringify(historicoLavagem));
localStorage.setItem("arrecadacoes",JSON.stringify(arrecadacoes));
localStorage.setItem("total",JSON.stringify(total));
}

function render(){
document.getElementById("historicoLavagem").innerHTML=historicoLavagem.slice(0,5).join("<br>");
atualizarTotal();
atualizarGrafico();
}

/* GRÁFICOS */
let grafico1=new Chart(document.getElementById("graficoLucro"),{
type:'line',
data:{labels:[],datasets:[{label:'Lucro',data:[],borderColor:'#ff0080',backgroundColor:'rgba(255,0,128,0.2)'}]},
options:{plugins:{legend:{labels:{color:'white'}}},scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}}
});

function atualizarGrafico(){
grafico1.data.labels=arrecadacoes.map((_,i)=>`Op ${i+1}`);
grafico1.data.datasets[0].data=arrecadacoes;
grafico1.update();
}

let grafico2=new Chart(document.getElementById("graficoDivisao"),{
type:'doughnut',
data:{labels:['FAC','Gerente'],datasets:[{data:[0,0],backgroundColor:['#ff0080','#00f2ff']}]},
options:{plugins:{legend:{labels:{color:'white'}}}}
});

function atualizarGraficoDivisao(fac,gerente){
grafico2.data.datasets[0].data=[fac,gerente];
grafico2.update();
}

/* INIT */
render();
</script>

</body>
</html>
