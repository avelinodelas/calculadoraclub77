<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club77 Calculadora criada por Avelino ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--neon:#ff00ff;
--bg:#000;
--card:#0d0d0d;
--scan:#00ff88;
}
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:var(--bg);
color:var(--neon);
overflow-x:hidden;
transition:0.5s;
}
.night{
--neon:#00ffff;
--bg:#040410;
--card:#0b0b1a;
}
canvas#matrix{
position:fixed;
top:0;
left:0;
z-index:-1;
}
.container{max-width:1100px;margin:auto;padding:20px;}
.title{text-align:center;font-size:26px;text-shadow:0 0 20px var(--neon);}
.card{
position:relative;
background:var(--card);
padding:20px;
border-radius:15px;
box-shadow:0 0 25px var(--neon);
margin-bottom:20px;
overflow:hidden;
}
.scan{
position:absolute;
top:0;
left:-100%;
width:100%;
height:3px;
background:var(--scan);
box-shadow:0 0 15px var(--scan);
animation:scanner 1s linear forwards;
}
@keyframes scanner{
0%{left:-100%;}
100%{left:100%;}
}
button{
margin:6px;
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:var(--neon);
color:#000;
}
button:hover{transform:scale(1.05);box-shadow:0 0 15px var(--neon);}
.risk{background:red;color:#fff;}
.glow{animation:glow 1s infinite alternate;}
@keyframes glow{
from{box-shadow:0 0 15px var(--neon);}
to{box-shadow:0 0 45px var(--neon);}
}
input{
width:100%;
padding:12px;
background:#111;
border:1px solid var(--neon);
color:#fff;
border-radius:8px;
}
.history{max-height:200px;overflow:auto;font-size:12px;}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
<div class="title">Club77 Calculadora criada por Avelino ❤️</div>

<div class="card">
<h3>💰 Lavagem</h3>
<p>5% máquina incluso nas taxas</p>
<input type="number" id="valor" placeholder="Digite o valor">
<button class="risk" onclick="simular(0.20)">20% (Extremo Risco)</button>
<button onclick="simular(0.25)">25% Parceria</button>
<button onclick="simular(0.35)">35% Normal</button>
<button onclick="simular(0.40)">40%</button>
<div id="preview"></div>
<button onclick="executar()">Executar</button>
<button onclick="apagarUltimo()">🗑 Apagar Última</button>
</div>

<div class="card" id="divCard">
<h3>🏦 Divisão do Lucro Líquido</h3>
<div id="divisao"></div>
</div>

<div class="card">
<h3>🧠 Estatísticas Inteligentes</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>📊 Fac x Gerente</h3>
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>📅 Histórico</h3>
<div class="history" id="historico"></div>
<button onclick="toggleNight()">Modo Noturno</button>
</div>

</div>

<script>

// ===== MATRIX FUNDO =====
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.height=window.innerHeight;
canvas.width=window.innerWidth;
const letters="010101010101";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];
for(let x=0;x<columns;x++)drops[x]=1;
function draw(){
ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--neon');
ctx.font=fontSize+"px monospace";
for(let i=0;i<drops.length;i++){
const text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height&&Math.random()>0.99)drops[i]=0;
drops[i]++;
}}
setInterval(draw,130);

// ===== AUDIO ENGINE REALISTA =====
let audioCtx;
document.addEventListener("click",()=>{
if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
},{once:true});

function caixaRegistradora(){
if(!audioCtx) return;

// bip inicial
let osc1=audioCtx.createOscillator();
let gain1=audioCtx.createGain();
osc1.type="square";
osc1.frequency.setValueAtTime(900,audioCtx.currentTime);
gain1.gain.setValueAtTime(0.2,audioCtx.currentTime);
gain1.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
osc1.connect(gain1);
gain1.connect(audioCtx.destination);
osc1.start();
osc1.stop(audioCtx.currentTime+0.15);

// som gaveta
let osc2=audioCtx.createOscillator();
let gain2=audioCtx.createGain();
osc2.type="triangle";
osc2.frequency.setValueAtTime(120,audioCtx.currentTime+0.15);
gain2.gain.setValueAtTime(0.15,audioCtx.currentTime+0.15);
gain2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
osc2.connect(gain2);
gain2.connect(audioCtx.destination);
osc2.start(audioCtx.currentTime+0.15);
osc2.stop(audioCtx.currentTime+0.5);
}

// ===== SISTEMA =====
let historico=JSON.parse(localStorage.getItem("club77"))||[];
historico=historico.map(h=>({
data:h.data||new Date().toISOString().split("T")[0],
lucro:Number(h.lucro)||0,
fac:Number(h.fac)||0,
gerente:Number(h.gerente)||0
}));
localStorage.setItem("club77",JSON.stringify(historico));

let previewData=null;
let chart=null;

function simular(taxa){
caixaRegistradora();
let valor=parseFloat(document.getElementById("valor").value);
if(!valor||valor<=0)return;
let cliente=valor*(1-taxa);
let lucro=valor-cliente;
previewData={lucro};
document.getElementById("preview").innerHTML=
`Cliente: R$ ${cliente.toLocaleString()}<br>Lucro líquido: R$ ${lucro.toLocaleString()}`;
}

function contador(id,valor){
let el=document.getElementById(id);
let start=0;
let inc=valor/40;
let i=setInterval(()=>{
start+=inc;
if(start>=valor){start=valor;clearInterval(i);}
el.innerText="R$ "+Math.floor(start).toLocaleString();
},20);
}

function executar(){
if(!previewData)return;
caixaRegistradora();

let lucro=previewData.lucro;
let facPercent=lucro>2000000?0.40:0.35;
let fac=lucro*facPercent;
let gerente=lucro-fac;

// efeito scanner
let card=document.getElementById("divCard");
let scan=document.createElement("div");
scan.classList.add("scan");
card.appendChild(scan);
setTimeout(()=>scan.remove(),1000);

document.getElementById("divisao").innerHTML=
`Lucro:<div id="l"></div>
Fac:<div id="f"></div>
Gerente:<div id="g"></div>`;

contador("l",lucro);
contador("f",fac);
contador("g",gerente);

historico.push({
data:new Date().toISOString().split("T")[0],
lucro,fac,gerente
});
localStorage.setItem("club77",JSON.stringify(historico));
renderTudo();
}

function apagarUltimo(){
caixaRegistradora();
historico.pop();
localStorage.setItem("club77",JSON.stringify(historico));
renderTudo();
}

function renderStats(){
if(historico.length===0){
document.getElementById("stats").innerHTML=
`Operações: 0<br>Lucro Total: R$ 0<br>Média: R$ 0<br>Maior lucro: R$ 0`;
return;
}
let total=historico.reduce((a,b)=>a+b.lucro,0);
let media=total/historico.length;
let maior=Math.max(...historico.map(h=>h.lucro));
document.getElementById("stats").innerHTML=
`Operações: ${historico.length}
<br>Lucro Total: R$ ${total.toLocaleString()}
<br>Média: R$ ${Math.floor(media).toLocaleString()}
<br>Maior lucro: R$ ${maior.toLocaleString()}`;
}

function renderGrafico(){
let totalFac=historico.reduce((a,b)=>a+b.fac,0);
let totalGer=historico.reduce((a,b)=>a+b.gerente,0);
if(chart)chart.destroy();
chart=new Chart(document.getElementById("grafico"),{
type:"bar",
data:{labels:["Fac","Gerente"],
datasets:[{data:[totalFac,totalGer]}]}
});
}

function renderHistorico(){
let html="";
historico.forEach(h=>{
html+=`${h.data} | Lucro: R$ ${h.lucro.toLocaleString()}<br>`;
});
document.getElementById("historico").innerHTML=html;
}

function renderTudo(){
renderStats();
renderGrafico();
renderHistorico();
}

function toggleNight(){
document.body.classList.toggle("night");
}

renderTudo();

</script>
</body>
</html>
